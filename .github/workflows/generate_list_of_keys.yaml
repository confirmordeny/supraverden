name: List of keys

on:
  push:
    branches:
      - main
    paths:
      - 'data/general_list.yaml'
      - 'data/united_nations.yaml'
      
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extract-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Extract Keys and Generate List
        run: python scripts/generate_list_of_keys_md.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Update LIST_OF_KEYS.md with recursive grouping"
          file_pattern: "dist/LIST_OF_KEYS.md"
