name: Org families list

on:
  push:
    branches:
      - main
    paths:
      - 'data/**.yaml' # Watch all yaml files in data
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # REQUIRED for committing back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run Generator
        run: python scripts/generate_org_families_md.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: Update organization families summary"
          file_pattern: "dist/ORG_FAMILIES.md"
          skip_fetch: true
