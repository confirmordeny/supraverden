name: Generate data dictionary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate Markdown from YAML
        run: |
          python scripts/generate_data_dictionary_md.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/DATA_DICTIONARY.md
          git diff-index --quiet HEAD || (git commit -m "docs: auto-generate data dictionary markdown" && git push)
