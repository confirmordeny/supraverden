name: Enrich data with data from Wikidata

on:
  workflow_dispatch: 

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write 

jobs:
  enrich-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
          # We need pyyaml and requests for the script to function
        run: pip install pyyaml requests

      - name: Run Enrichment Script
        run: python scripts/enrich_wikidata_fields.py

      - name: Enrich VAT numbers and websites from Wikidata
        run: |
          python scripts/enrich_vat_from_wikidata.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Enrich: Fixed syntax and ensured full name preservation"
            git push
          fi
