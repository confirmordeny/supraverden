name: Generate Dist Outputs

on:
  push:
    branches:
      - main
    paths:
      - 'data/general_list.yaml'
      - 'data/data_dictionary.yaml'
      - 'data/FATF_definition_analysis.yaml'
      - 'scripts/generate_data_dictionary_md.py'
      - 'scripts/generate_a_to_z_md.py'
      - 'scripts/generate_extended_a_to_z_md.py'
      - 'scripts/generate_all_bodies_md.py'
      - 'scripts/generate_fatf_assessments_md.py'
      - '.github/workflows/generate_dist_outputs.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Generate markdown outputs
        run: |
          python scripts/generate_data_dictionary_md.py
          python scripts/generate_a_to_z_md.py
          python scripts/generate_extended_a_to_z_md.py
          python scripts/generate_all_bodies_md.py
          python scripts/generate_fatf_assessments_md.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/DATA_DICTIONARY.md dist/ENGLISH_A_TO_Z_LIST.md dist/ENGLISH_EXTENDED_A_TO_Z_LIST.md dist/ALL_BODIES.md dist/FATF_ASSESSMENTS.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: auto-generate dist outputs (dictionary, a-z, extended a-z, bodies, fatf)"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
