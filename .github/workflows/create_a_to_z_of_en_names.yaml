name: Create A to Z

on:
  push:
    branches:
      - main
    paths:
      - 'data/general_list.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate Alphabetical Markdown List
        run: |
          python3 - <<'EOF'
          import os
          import sys
          import yaml

          # --- CONFIGURATION ---
          input_files = [
              'data/general_list.yaml'
          ]
          output_file = 'dist/ENGLISH_A_TO_Z_LIST.md'

          # --- PARSING LOGIC ---
          def parse_file(filepath):
              """Parses YAML robustly, including explicit key syntax."""
              if not os.path.exists(filepath):
                  print(f'Warning: Input file not found at {filepath}')
                  return []

              with open(filepath, 'r', encoding='utf-8') as f:
                  data = yaml.safe_load(f) or {}

              if not isinstance(data, dict):
                  print(f'Warning: YAML root is not a mapping in {filepath}')
                  return []

              organizations = []
              for org_name, props in data.items():
                  row = {'_main_name': str(org_name)}
                  if isinstance(props, dict):
                      row.update(props)
                  organizations.append(row)
              return organizations

          # --- MARKDOWN GENERATOR ---
          def generate_alphabetical_list(organizations):
              lines = []
              
              # 1. Sort organizations by English name or Main name
              sorted_orgs = sorted(
                  organizations, 
                  key=lambda x: (x.get('Name_en') or x.get('_main_name') or '').strip().lower()
              )

              # 2. Group by First Letter
              groups = {}
              for org in sorted_orgs:
                  name = org.get('Name_en') or org.get('_main_name')
                  if not name: continue
                  
                  # Get first character
                  first_char = name.strip().lstrip('"\'').upper()[0]
                  if not first_char.isalpha():
                      first_char = '#'
                  
                  if first_char not in groups:
                      groups[first_char] = []
                  groups[first_char].append(org)

              sorted_keys = sorted(groups.keys())

              # 3. Create Top Navigation (A | B | C...)
              lines.append('<div id="top"></div>\n')
              nav_links = []
              for letter in sorted_keys:
                  nav_links.append(f'[{letter}](#{letter.lower()})')
              
              lines.append(' | '.join(nav_links))
              lines.append('\n---\n')

              # 4. Build List Body
              for letter in sorted_keys:
                  lines.append(f'## {letter}\n')
                  
                  for org in groups[letter]:
                      name = org.get('Name_en') or org.get('_main_name')
                      
                      # Clean output: just the name in a list item
                      lines.append(f'- {name}')
                  
                  lines.append('\n[↑ Back to Top](#top)\n')

              return '\n'.join(lines)

          # --- MAIN EXECUTION ---
          all_organizations = []
          
          for input_file in input_files:
              print(f"Reading {input_file}...")
              data = parse_file(input_file)
              all_organizations.extend(data)

          print(f"Total organizations found: {len(all_organizations)}")
          
          md_content = generate_alphabetical_list(all_organizations)

          os.makedirs(os.path.dirname(output_file), exist_ok=True)
          
          with open(output_file, 'w', encoding='utf-8') as f:
              f.write('# Alphabetical list of names of international organisations in English\n\n')
              f.write(md_content)
              
          print(f"Successfully wrote alphabetical list to '{output_file}'")
          EOF

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-update alphabetical bodies list"
          file_pattern: "dist/ENGLISH_A_TO_Z_LIST.md"
